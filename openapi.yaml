openapi: "3.0.3"
info:
  title: SkillLedger API
  version: "0.1.0"
  description: |
    SkillLedger is a Rails API for publishing, verifying, listing, purchasing,
    and acquiring agent skill artifacts. The API supports both REST workflows
    and a JSON-RPC style MCP endpoint.
  contact:
    name: SkillLedger Maintainers
    url: https://github.com/ghassan-ai-projects/skill-ledger

servers:
  - url: http://127.0.0.1:3000
    description: Local development

security:
  - ApiKeyAuth: []

tags:
  - name: Skills
  - name: Favorites
  - name: Library
  - name: Ledger
  - name: Reports
  - name: Analytics
  - name: MCP

paths:
  /api/v1/skills:
    get:
      tags: [Skills]
      summary: List skills
      parameters:
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/AuthorId"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated skill list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsIndexResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
    post:
      tags: [Skills]
      summary: Create a skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSkillRequest"
      responses:
        "201":
          description: Skill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedSkill"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/skills/{id}:
    get:
      tags: [Skills]
      summary: Get a skill
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Skill detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/skills/{id}/versions:
    post:
      tags: [Skills]
      summary: Publish a version for a skill
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVersionRequest"
      responses:
        "201":
          description: Version registration result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionRegistrationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/skills/{id}/listing_status:
    patch:
      tags: [Skills]
      summary: Update skill listing status
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingStatusRequest"
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/favorites:
    get:
      tags: [Favorites]
      summary: List favorites
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoritesIndexResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Favorites]
      summary: Add a favorite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFavoriteRequest"
      responses:
        "201":
          description: Favorite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFavoriteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/favorites/{id}:
    delete:
      tags: [Favorites]
      summary: Remove a favorite by skill id
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Favorite removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/me/library:
    get:
      tags: [Library]
      summary: Get the current account library
      responses:
        "200":
          description: Library groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ledger:
    get:
      tags: [Ledger]
      summary: List ledger entries
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerIndexResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/reports:
    get:
      tags: [Reports]
      summary: Get marketplace summary metrics
      responses:
        "200":
          description: Global counters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/authors/{id}/analytics:
    get:
      tags: [Analytics]
      summary: Get author analytics for the authenticated author
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Period"
      responses:
        "200":
          description: Author analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/authors/{id}/earnings:
    get:
      tags: [Analytics]
      summary: Get author earnings series for the authenticated author
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Period"
      responses:
        "200":
          description: Author earnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/mcp:
    post:
      tags: [MCP]
      summary: Send an MCP-style JSON-RPC request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/McpRequest"
      responses:
        "200":
          description: JSON-RPC success response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpSuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: JSON-RPC error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpErrorResponse"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Q:
      name: q
      in: query
      schema:
        type: string
    AuthorId:
      name: author_id
      in: query
      schema:
        type: integer
    AccountId:
      name: account_id
      in: query
      schema:
        type: integer
    Sort:
      name: sort
      in: query
      schema:
        type: string
        enum: [price, name, created_at]
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    Period:
      name: period
      in: query
      schema:
        type: string
        enum: [last_7_days, last_30_days, last_90_days, this_year]

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Action is not allowed for the authenticated account
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Request failed domain or validation checks
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    AccountSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required: [id, name]

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        total_pages:
          type: integer
        total_count:
          type: integer
        per_page:
          type: integer
      required: [current_page, total_pages, total_count, per_page]

    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: string
      required: [error, details]

    Skill:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        author_id:
          type: integer
        listing_status:
          type: string
          enum: [draft, listed, suspended]
        price:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/AccountSummary"
        latest_verified_version:
          type: string
          nullable: true
        favorite_count:
          type: integer
        is_favorited:
          type: boolean
      required:
        - id
        - slug
        - name
        - author_id
        - listing_status
        - price
        - author
        - favorite_count
        - is_favorited

    CreatedSkill:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        author_id:
          type: integer
        listing_status:
          type: string
        price:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/AccountSummary"
      required: [id, slug, name, author_id, listing_status, price, author]

    SkillsIndexResponse:
      type: object
      properties:
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required: [skills, meta]

    CreateSkillRequest:
      type: object
      properties:
        skill:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            price:
              type: number
          required: [name, price]
      required: [skill]

    ManifestFile:
      type: object
      properties:
        path:
          type: string
        media_type:
          type: string
        content:
          type: string
      required: [path, media_type, content]

    ArtifactManifest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        runtime:
          type: string
        entrypoint:
          type: string
        input_schema:
          type: object
          additionalProperties: true
        output_schema:
          type: object
          additionalProperties: true
        files:
          type: array
          items:
            $ref: "#/components/schemas/ManifestFile"
      required:
        - name
        - description
        - version
        - runtime
        - entrypoint
        - input_schema
        - output_schema

    CreateVersionRequest:
      type: object
      properties:
        version:
          type: object
          properties:
            version:
              type: string
            changelog:
              type: string
              nullable: true
            artifact:
              type: object
              properties:
                artifact_type:
                  type: string
                  default: mcp_tool_manifest
                manifest:
                  $ref: "#/components/schemas/ArtifactManifest"
              required: [manifest]
          required: [version, artifact]
      required: [version]

    VerificationChecks:
      type: object
      additionalProperties:
        type: boolean

    VersionRegistrationResponse:
      type: object
      properties:
        skill_id:
          type: integer
        version:
          type: object
          properties:
            id:
              type: integer
            version:
              type: string
            changelog:
              type: string
              nullable: true
            status:
              type: string
          required: [id, version, status]
        artifact:
          type: object
          properties:
            artifact_type:
              type: string
            checksum:
              type: string
            manifest:
              $ref: "#/components/schemas/ArtifactManifest"
          required: [artifact_type, checksum, manifest]
        verification:
          type: object
          properties:
            status:
              type: string
            checks:
              $ref: "#/components/schemas/VerificationChecks"
            verified_at:
              type: string
              format: date-time
              nullable: true
            failure_reason:
              type: string
              nullable: true
          required: [status, checks]
      required: [skill_id, version, artifact, verification]

    UpdateListingStatusRequest:
      type: object
      properties:
        skill:
          type: object
          properties:
            listing_status:
              type: string
              enum: [draft, listed, suspended]
          required: [listing_status]
      required: [skill]

    FavoritesIndexResponse:
      type: object
      properties:
        favorites:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required: [favorites, meta]

    CreateFavoriteRequest:
      type: object
      properties:
        skill_id:
          type: integer
      required: [skill_id]

    CreateFavoriteResponse:
      type: object
      properties:
        message:
          type: string
        favorite_id:
          type: integer
      required: [message, favorite_id]

    LibrarySkill:
      allOf:
        - $ref: "#/components/schemas/Skill"
        - type: object
          properties:
            purchased_version:
              type: string
              nullable: true
            purchase_status:
              type: string
              nullable: true
            purchased_at:
              type: string
              format: date-time
              nullable: true
            acquired_at:
              type: string
              format: date-time
              nullable: true

    LibraryResponse:
      type: object
      properties:
        favorites:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        purchased:
          type: array
          items:
            $ref: "#/components/schemas/LibrarySkill"
        my_skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
      required: [favorites, purchased, my_skills]

    LedgerEntry:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: string
        entry_type:
          type: string
        timestamp:
          type: string
          format: date-time
        from_account_id:
          type: integer
        to_account_id:
          type: integer
        from_account:
          $ref: "#/components/schemas/AccountSummary"
        to_account:
          $ref: "#/components/schemas/AccountSummary"
      required:
        - id
        - amount
        - entry_type
        - timestamp
        - from_account_id
        - to_account_id

    LedgerIndexResponse:
      type: object
      properties:
        ledger_entries:
          type: array
          items:
            $ref: "#/components/schemas/LedgerEntry"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required: [ledger_entries, meta]

    ReportsResponse:
      type: object
      properties:
        total_skills:
          type: integer
        listed_skills:
          type: integer
        verified_skill_versions:
          type: integer
        total_purchases:
          type: integer
        total_revenue:
          type: number
        total_ledger_balance:
          type: number
      required:
        - total_skills
        - listed_skills
        - verified_skill_versions
        - total_purchases
        - total_revenue
        - total_ledger_balance

    AnalyticsTopSkill:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        purchase_count:
          type: integer
        total_revenue:
          type: number
      required: [id, name, purchase_count, total_revenue]

    RecentPurchase:
      type: object
      properties:
        id:
          type: integer
        skill_name:
          type: string
        buyer_name:
          type: string
        version:
          type: string
        status:
          type: string
        amount:
          type: number
        purchased_at:
          type: string
          format: date-time
        acquired_at:
          type: string
          format: date-time
          nullable: true
      required: [id, skill_name, buyer_name, version, status, amount, purchased_at]

    AnalyticsResponse:
      type: object
      properties:
        author:
          $ref: "#/components/schemas/AccountSummary"
        total_skills:
          type: integer
        listed_skills:
          type: integer
        verified_versions:
          type: integer
        total_purchases:
          type: integer
        total_revenue:
          type: number
        top_skills:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsTopSkill"
        recent_purchases:
          type: array
          items:
            $ref: "#/components/schemas/RecentPurchase"
      required:
        - author
        - total_skills
        - listed_skills
        - verified_versions
        - total_purchases
        - total_revenue
        - top_skills
        - recent_purchases

    EarningsPoint:
      type: object
      properties:
        date:
          type: string
        amount:
          type: number
        purchase_count:
          type: integer
      required: [date, amount, purchase_count]

    BestSkill:
      type: object
      properties:
        name:
          type: string
        revenue:
          type: number
      required: [name, revenue]

    EarningsResponse:
      type: object
      properties:
        earnings_over_time:
          type: array
          items:
            $ref: "#/components/schemas/EarningsPoint"
        total_earnings:
          type: number
        average_per_day:
          type: number
        best_skill:
          allOf:
            - $ref: "#/components/schemas/BestSkill"
          nullable: true
      required: [earnings_over_time, total_earnings, average_per_day]

    McpRequest:
      type: object
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        id:
          oneOf:
            - type: string
            - type: integer
        method:
          type: string
          enum:
            - skills/create
            - skills/mine.list
            - skills/version.publish
            - skills/version.get
            - skills/listing.set_status
            - skills/list
            - skills/get
            - skills/purchase
            - skills/acquire
        params:
          type: object
          additionalProperties: true
      required: [jsonrpc, id, method]

    McpSuccessResponse:
      type: object
      properties:
        jsonrpc:
          type: string
        id:
          oneOf:
            - type: string
            - type: integer
        result:
          type: object
          additionalProperties: true
      required: [jsonrpc, id, result]

    McpError:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      required: [code, message]

    McpErrorResponse:
      type: object
      properties:
        jsonrpc:
          type: string
        id:
          oneOf:
            - type: string
            - type: integer
          nullable: true
        error:
          $ref: "#/components/schemas/McpError"
      required: [jsonrpc, id, error]
