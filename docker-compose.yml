services:
  db:
    image: postgres:16
    container_name: skill-ledger-db
    environment:
      POSTGRES_DB: skill_ledger_development
      POSTGRES_USER: skill_ledger
      POSTGRES_PASSWORD: skill_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skill_ledger -d skill_ledger_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: skill-ledger-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://skill_ledger:skill_ledger@db:5432/skill_ledger_development
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    command: >
      bash -lc "
        bundle check || bundle install &&
        rm -f tmp/pids/server.pid &&
        bin/rails db:prepare &&
        bin/rails db:seed &&
        bin/rails server -b 0.0.0.0 -p 3000
      "

volumes:
  postgres_data:
  bundle_cache:
